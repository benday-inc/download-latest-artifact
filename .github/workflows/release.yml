name: 'release'
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run build && npm run package

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const tag = '${{ steps.get_version.outputs.VERSION }}';
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `Release ${tag}\n\nSee [README](https://github.com/${context.repo.owner}/${context.repo.repo}#readme) for usage.`,
              draft: false,
              prerelease: tag.includes('-')
            });
            console.log(`Created release: ${release.html_url}`);

      - name: Update major version tag
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          MAJOR="v$(echo "$VERSION" | cut -d'.' -f1 | tr -d 'v')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Update $MAJOR tag to $VERSION"
          git push origin "$MAJOR" --force
